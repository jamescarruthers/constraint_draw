<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constraint Sketch Solver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }
    #app {
      display: flex;
      height: 100vh;
    }
    #toolbar {
      width: 220px;
      background: #16213e;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
    }
    #toolbar h2 {
      font-size: 14px;
      color: #e94560;
      margin: 8px 0 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #toolbar button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a1a4e;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      transition: background 0.15s;
    }
    #toolbar button:hover { background: #1a1a6e; }
    #toolbar button.active { background: #e94560; color: #fff; }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.9);
      padding: 6px 12px;
      font-size: 12px;
      display: flex;
      gap: 20px;
      border-top: 1px solid #0f3460;
    }
    #status-bar .dof-ok { color: #4ecca3; }
    #status-bar .dof-under { color: #5dade2; }
    #status-bar .dof-over { color: #e94560; }

    #info-panel {
      width: 260px;
      background: #16213e;
      padding: 12px;
      overflow-y: auto;
      border-left: 1px solid #0f3460;
      font-size: 12px;
    }
    #info-panel h2 {
      font-size: 14px;
      color: #e94560;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #info-panel h3 {
      font-size: 11px;
      color: #5dade2;
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #info-panel .empty {
      color: #6a7aa0;
      font-style: italic;
    }
    #info-panel .summary-line {
      color: #a0a0c0;
      font-family: monospace;
      padding: 2px 0;
    }
    #info-panel .entity-card {
      background: #0f1a30;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 10px;
    }
    #info-panel .entity-header {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a2444;
    }
    #info-panel .entity-type {
      background: #4ecca3;
      color: #0f1a30;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    #info-panel .entity-id {
      color: #c0c0d0;
      font-family: monospace;
      font-size: 11px;
    }
    #info-panel .entity-construction {
      background: #7a6f9c;
      color: #0f1a30;
      font-weight: bold;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 9px;
      letter-spacing: 0.5px;
    }
    #info-panel .entity-details .detail-line {
      font-family: monospace;
      color: #a0a0c0;
      padding: 1px 0;
      font-size: 11px;
    }
    #info-panel .entity-constraints {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #1a2444;
    }
    #info-panel .group-label {
      color: #5dade2;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 4px 0 2px;
    }
    #info-panel .constraint-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      background: #1a2444;
      border-radius: 3px;
      margin-bottom: 2px;
    }
    #info-panel .constraint-desc {
      color: #e0e0e0;
      font-size: 11px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #info-panel .constraint-delete {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
      flex-shrink: 0;
    }
    #info-panel .constraint-delete:hover { color: #ff4060; }
    #info-panel .no-constraints {
      color: #6a7aa0;
      font-style: italic;
      font-size: 11px;
      padding: 4px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <h2>Entities</h2>
      <button data-tool="point">Point</button>
      <button data-tool="line">Line</button>
      <button data-tool="circle">Circle</button>
      <button data-tool="arc">Arc</button>

      <h2>Constraints</h2>
      <button data-tool="coincident">Coincident</button>
      <button data-tool="fixed">Fix Point</button>
      <button data-tool="horizontal">Horizontal</button>
      <button data-tool="vertical">Vertical</button>
      <button data-tool="parallel">Parallel</button>
      <button data-tool="perpendicular">Perpendicular</button>
      <button data-tool="tangentLineCircle">Tangent (L-C)</button>
      <button data-tool="tangentCircleCircle">Tangent (C-C)</button>
      <button data-tool="equalLength">Equal Length</button>
      <button data-tool="equalRadius">Equal Radius</button>
      <button data-tool="concentric">Concentric</button>
      <button data-tool="pointOnLine">Point on Line</button>
      <button data-tool="pointOnCircle">Point on Circle</button>
      <button data-tool="midpoint">Midpoint</button>
      <button data-tool="collinear">Collinear</button>
      <button data-tool="symmetric">Symmetric</button>

      <h2>Dimensions</h2>
      <button data-tool="fixedLength">Fixed Length</button>
      <button data-tool="fixedAngle">Fixed Angle</button>
      <button data-tool="angleBetween">Angle Between</button>
      <button data-tool="fixedRadius">Fixed Radius</button>
      <button data-tool="horizontalDist">Horiz. Distance</button>
      <button data-tool="verticalDist">Vert. Distance</button>

      <h2>Actions</h2>
      <button data-tool="select" class="active">Select / Drag</button>
      <button data-action="constructionMode">Construction Mode: OFF</button>
      <button data-tool="delete">Delete</button>
      <button data-action="save">Save SVG</button>
      <button data-action="load">Load SVG</button>
    </div>
    <div id="canvas-container">
      <canvas id="sketch-canvas"></canvas>
      <div id="status-bar">
        <span id="status-state">IDLE</span>
        <span id="status-dof">DOF: —</span>
        <span id="status-info"></span>
      </div>
    </div>
    <div id="info-panel">
      <h2>Info</h2>
      <p class="empty">Select an entity to see details</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
