<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constraint Sketch Solver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }
    #app {
      display: flex;
      height: 100vh;
    }
    #toolbar {
      width: 220px;
      background: #16213e;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
    }
    #toolbar h2 {
      font-size: 14px;
      color: #e94560;
      margin: 8px 0 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #toolbar button {
      background: #0f3460;
      color: #e0e0e0;
      border: 1px solid #1a1a4e;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      text-align: left;
      transition: background 0.15s;
    }
    #toolbar button:hover { background: #1a1a6e; }
    #toolbar button.active { background: #e94560; color: #fff; }
    #canvas-container {
      flex: 1;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.9);
      padding: 6px 12px;
      font-size: 12px;
      display: flex;
      gap: 20px;
      border-top: 1px solid #0f3460;
    }
    #status-bar .dof-ok { color: #4ecca3; }
    #status-bar .dof-under { color: #5dade2; }
    #status-bar .dof-over { color: #e94560; }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <h2>Entities</h2>
      <button data-tool="point">Point</button>
      <button data-tool="line">Line</button>
      <button data-tool="circle">Circle</button>
      <button data-tool="arc">Arc</button>

      <h2>Constraints</h2>
      <button data-tool="coincident">Coincident</button>
      <button data-tool="fixed">Fix Point</button>
      <button data-tool="horizontal">Horizontal</button>
      <button data-tool="vertical">Vertical</button>
      <button data-tool="parallel">Parallel</button>
      <button data-tool="perpendicular">Perpendicular</button>
      <button data-tool="tangentLineCircle">Tangent (L-C)</button>
      <button data-tool="tangentCircleCircle">Tangent (C-C)</button>
      <button data-tool="equalLength">Equal Length</button>
      <button data-tool="equalRadius">Equal Radius</button>
      <button data-tool="concentric">Concentric</button>
      <button data-tool="pointOnLine">Point on Line</button>
      <button data-tool="pointOnCircle">Point on Circle</button>
      <button data-tool="midpoint">Midpoint</button>
      <button data-tool="collinear">Collinear</button>
      <button data-tool="symmetric">Symmetric</button>

      <h2>Dimensions</h2>
      <button data-tool="fixedLength">Fixed Length</button>
      <button data-tool="fixedAngle">Fixed Angle</button>
      <button data-tool="angleBetween">Angle Between</button>
      <button data-tool="fixedRadius">Fixed Radius</button>
      <button data-tool="horizontalDist">Horiz. Distance</button>
      <button data-tool="verticalDist">Vert. Distance</button>

      <h2>Actions</h2>
      <button data-tool="select" class="active">Select / Drag</button>
      <button data-action="constructionMode">Construction Mode: OFF</button>
      <button data-tool="delete">Delete</button>
      <button data-action="save">Save SVG</button>
      <button data-action="load">Load SVG</button>
    </div>
    <div id="canvas-container">
      <canvas id="sketch-canvas"></canvas>
      <div id="status-bar">
        <span id="status-state">IDLE</span>
        <span id="status-dof">DOF: —</span>
        <span id="status-info"></span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
