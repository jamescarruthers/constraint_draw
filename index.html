<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constraint Sketch Solver</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
    }

    /* ─── Layout ─────────────────────────────────────────────── */

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #top-bar {
      display: flex;
      align-items: center;
      background: #16213e;
      padding: 3px 8px;
      gap: 3px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #main-area {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    #sidebar {
      width: 44px;
      background: #16213e;
      padding: 3px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow-y: auto;
      border-right: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      min-width: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ─── Icon buttons (shared) ──────────────────────────────── */

    .tb { /* tool button */
      width: 36px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f3460;
      color: #c0c0d0;
      border: 1px solid #1a1a4e;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      transition: background 0.12s, color 0.12s;
      flex-shrink: 0;
      padding: 0;
    }
    .tb:hover { background: #1a1a6e; color: #fff; }
    .tb.active { background: #e94560; color: #fff; }

    .tb-sep { /* thin vertical/horizontal separator */
      width: 1px;
      align-self: stretch;
      margin: 4px 4px;
      background: #0f3460;
    }
    #sidebar .tb-sep {
      width: auto;
      height: 1px;
      margin: 3px 2px;
    }
    #sidebar .tb { width: 36px; }

    /* Smaller font for two-char icons */
    .tb.sm { font-size: 13px; letter-spacing: -1px; }

    /* ─── Status bar ─────────────────────────────────────────── */

    #status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.92);
      padding: 5px 12px;
      font-size: 12px;
      display: flex;
      gap: 20px;
      border-top: 1px solid #0f3460;
    }
    #status-bar .dof-ok { color: #4ecca3; }
    #status-bar .dof-under { color: #5dade2; }
    #status-bar .dof-over { color: #e94560; }
    #status-hover {
      margin-left: auto;
      color: #8a8ab0;
      font-style: italic;
      white-space: nowrap;
    }

    /* ─── Info panel (right) ─────────────────────────────────── */

    #info-panel {
      width: 260px;
      background: #16213e;
      padding: 12px;
      overflow-y: auto;
      border-left: 1px solid #0f3460;
      font-size: 12px;
      flex-shrink: 0;
    }
    #info-panel h2 {
      font-size: 14px;
      color: #e94560;
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #info-panel h3 {
      font-size: 11px;
      color: #5dade2;
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #info-panel .empty {
      color: #6a7aa0;
      font-style: italic;
    }
    #info-panel .summary-line {
      color: #a0a0c0;
      font-family: monospace;
      padding: 2px 0;
    }
    #info-panel .entity-card {
      background: #0f1a30;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 10px;
    }
    #info-panel .entity-header {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1a2444;
    }
    #info-panel .entity-type {
      background: #4ecca3;
      color: #0f1a30;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.5px;
    }
    #info-panel .entity-id {
      color: #c0c0d0;
      font-family: monospace;
      font-size: 11px;
    }
    #info-panel .entity-construction {
      background: #7a6f9c;
      color: #0f1a30;
      font-weight: bold;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 9px;
      letter-spacing: 0.5px;
    }
    #info-panel .entity-details .detail-line {
      font-family: monospace;
      color: #a0a0c0;
      padding: 1px 0;
      font-size: 11px;
    }
    #info-panel .entity-constraints {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid #1a2444;
    }
    #info-panel .group-label {
      color: #5dade2;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin: 4px 0 2px;
    }
    #info-panel .constraint-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
      padding: 3px 6px;
      background: #1a2444;
      border-radius: 3px;
      margin-bottom: 2px;
    }
    #info-panel .constraint-desc {
      color: #e0e0e0;
      font-size: 11px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #info-panel .constraint-delete {
      background: none;
      border: none;
      color: #e94560;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
      flex-shrink: 0;
    }
    #info-panel .constraint-delete:hover { color: #ff4060; }
    #info-panel .no-constraints {
      color: #6a7aa0;
      font-style: italic;
      font-size: 11px;
      padding: 4px 0;
    }
    #info-panel .entity-id-input {
      background: transparent;
      color: #c0c0d0;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: monospace;
      font-size: 11px;
      flex: 1;
      min-width: 0;
      outline: none;
    }
    #info-panel .entity-id-input:hover { border-color: #1a2444; }
    #info-panel .entity-id-input:focus {
      border-color: #5dade2;
      background: #1a2444;
    }
    #info-panel .entity-id-input.invalid { border-color: #e94560; }
    #info-panel .constraint-label {
      color: #a0a0c0;
      font-size: 11px;
      flex-shrink: 0;
    }
    #info-panel .constraint-value-input {
      background: #0f1a30;
      color: #f0a030;
      border: 1px solid #1a2444;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: monospace;
      font-size: 11px;
      width: 70px;
      text-align: right;
      outline: none;
    }
    #info-panel .constraint-value-input:focus {
      border-color: #f0a030;
      background: #000012;
    }
    #info-panel .constraint-value-unit {
      color: #6a7aa0;
      font-size: 10px;
      margin-left: 2px;
    }
    #info-panel .constraint-reassign {
      background: #0f1a30;
      color: #e0e0e0;
      border: 1px solid #1a2444;
      border-radius: 3px;
      padding: 1px 4px;
      font-family: monospace;
      font-size: 11px;
      max-width: 110px;
      outline: none;
    }
    #info-panel .constraint-reassign:focus { border-color: #5dade2; }
  </style>
</head>
<body>
  <div id="app">

    <!-- ═══ Top toolbar: entities + actions ═══ -->
    <div id="top-bar">
      <button class="tb active" data-tool="select"  data-desc="Select / Drag (Esc)">↖</button>
      <div class="tb-sep"></div>
      <button class="tb" data-tool="point"  data-desc="Draw Point">●</button>
      <button class="tb" data-tool="line"   data-desc="Draw Line">╱</button>
      <button class="tb" data-tool="circle" data-desc="Draw Circle">○</button>
      <button class="tb" data-tool="arc"    data-desc="Draw Arc">◠</button>
      <div class="tb-sep"></div>
      <button class="tb" data-action="constructionMode" data-desc="Toggle Construction Mode (C)">⊟</button>
      <button class="tb" data-tool="delete" data-desc="Delete Entity (Del)">✕</button>
      <div class="tb-sep"></div>
      <button class="tb" data-action="save" data-desc="Save sketch as SVG">⤓</button>
      <button class="tb" data-action="load" data-desc="Load sketch from SVG">⤒</button>
    </div>

    <div id="main-area">

      <!-- ═══ Left sidebar: constraints + dimensions ═══ -->
      <div id="sidebar">
        <button class="tb" data-tool="coincident"          data-desc="Coincident">⊕</button>
        <button class="tb" data-tool="fixed"               data-desc="Fix Point">⊗</button>
        <button class="tb" data-tool="horizontal"          data-desc="Horizontal">═</button>
        <button class="tb" data-tool="vertical"            data-desc="Vertical">║</button>
        <button class="tb" data-tool="parallel"            data-desc="Parallel">∥</button>
        <button class="tb" data-tool="perpendicular"       data-desc="Perpendicular">⊥</button>
        <button class="tb" data-tool="tangentLineCircle"   data-desc="Tangent (Line–Circle)">⌒</button>
        <button class="tb" data-tool="tangentCircleCircle" data-desc="Tangent (Circle–Circle)">⊙</button>
        <button class="tb" data-tool="equalLength"         data-desc="Equal Length">≐</button>
        <button class="tb" data-tool="equalRadius"         data-desc="Equal Radius">≑</button>
        <button class="tb" data-tool="concentric"          data-desc="Concentric">⊚</button>
        <button class="tb" data-tool="pointOnLine"         data-desc="Point on Line">◉</button>
        <button class="tb" data-tool="pointOnCircle"       data-desc="Point on Circle">◎</button>
        <button class="tb" data-tool="midpoint"            data-desc="Midpoint">△</button>
        <button class="tb" data-tool="collinear"           data-desc="Collinear">≡</button>
        <button class="tb" data-tool="symmetric"           data-desc="Symmetric">⋈</button>
        <div class="tb-sep"></div>
        <button class="tb" data-tool="fixedLength"         data-desc="Fixed Length">↔</button>
        <button class="tb" data-tool="fixedAngle"          data-desc="Fixed Angle">∠</button>
        <button class="tb" data-tool="angleBetween"        data-desc="Angle Between">∡</button>
        <button class="tb" data-tool="fixedRadius"         data-desc="Fixed Radius">⊘</button>
        <button class="tb sm" data-tool="horizontalDist"   data-desc="Horizontal Distance">↔x</button>
        <button class="tb sm" data-tool="verticalDist"     data-desc="Vertical Distance">↕y</button>
        <button class="tb sm" data-tool="perpDistance"      data-desc="Perpendicular Distance">⊥d</button>
      </div>

      <!-- ═══ Canvas ═══ -->
      <div id="canvas-container">
        <canvas id="sketch-canvas"></canvas>
        <div id="status-bar">
          <span id="status-state">IDLE</span>
          <span id="status-dof">DOF: —</span>
          <span id="status-info"></span>
          <span id="status-hover"></span>
        </div>
      </div>

      <!-- ═══ Info panel (right) ═══ -->
      <div id="info-panel">
        <h2>Info</h2>
        <p class="empty">Select an entity to see details</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
